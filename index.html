<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות - פתרון שגיאות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: system-ui, sans-serif; }
        .hidden { display: none; }
        .loader { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">יוצר הגלויות 🎨</h1>
            <p class="text-indigo-100 text-sm">בינה מלאכותית בשירות הדמיון</p>
        </div>

        <div class="p-6">
            <textarea id="promptInput" rows="3" 
                class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none mb-4"
                placeholder="תארו את הארץ שלכם (למשל: עיר על הירח)"></textarea>

            <button id="btn" onclick="startGeneration()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                צייר לי גלויה!
            </button>
            
            <div id="debugInfo" class="hidden mt-4 p-3 bg-amber-50 text-amber-800 rounded-lg text-xs font-mono border border-amber-200">
                <strong>יומן פעולות:</strong>
                <ul id="logList" class="list-disc list-inside mt-1"></ul>
            </div>
        </div>

        <div class="bg-slate-50 p-6 flex flex-col items-center justify-center min-h-[300px]">
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="loader w-10 h-10 border-4 border-slate-200 rounded-full mb-3"></div>
                <p id="statusText" class="text-indigo-600 font-medium italic">מעבד...</p>
            </div>

            <div id="result" class="hidden w-full">
                <img id="finalImage" class="w-full h-auto rounded-lg shadow-md border-4 border-white" src="">
            </div>

            <p id="placeholder" class="text-slate-400">הגלויה תופיע כאן</p>
        </div>
    </div>

    <script>
        function addLog(msg) {
            const list = document.getElementById('logList');
            const li = document.createElement('li');
            li.innerText = msg;
            list.appendChild(li);
            document.getElementById('debugInfo').classList.remove('hidden');
        }

        async function startGeneration() {
            const input = document.getElementById('promptInput').value.trim();
            if(!input) return;

            document.getElementById('logList').innerHTML = "";
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btn').disabled = true;
            
            const status = document.getElementById('statusText');
            let finalPrompt = "magical landscape"; // ברירת מחדל באנגלית למקרה של כישלון

            try {
                addLog("מתרגם את התיאור...");
                status.innerText = "מתרגם...";

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ promptInput: input })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        addLog("התרגום הצליח: " + data.refinedPrompt);
                        finalPrompt = data.refinedPrompt;
                    } else {
                        addLog("השרת החזיר שגיאה, משתמש בברירת מחדל באנגלית.");
                        // אם התרגום נכשל, נשתמש במושג כללי כדי שהציור לא ייכשל בגלל עברית
                        finalPrompt = "magical land " + Math.random().toString(36).substring(7);
                    }
                } catch (e) {
                    addLog("בעיית תקשורת עם השרת.");
                }

                status.innerText = "מצייר...";
                addLog("מייצר תמונה עבור: " + finalPrompt);

                const seed = Math.floor(Math.random() * 1000000);
                // שימוש במודל פשוט יותר ב-Pollinations ליתר ביטחון
                const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(finalPrompt)}?width=800&height=800&seed=${seed}`;

                const img = new Image();
                img.onload = () => {
                    document.getElementById('finalImage').src = imageUrl;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('btn').disabled = false;
                    addLog("הצלחה!");
                };
                img.onerror = () => {
                    addLog("שירות הציור לא הגיב.");
                    status.innerText = "שגיאה בציור.";
                    document.getElementById('btn').disabled = false;
                };
                img.src = imageUrl;

            } catch (err) {
                addLog("תקלה: " + err.message);
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
