<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות הדמיוניות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, sans-serif; }
        .hidden { display: none; }
        .postcard-container { 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 12px solid white;
        }
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .loading-pulse { animation: shimmer 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-teal-600 p-8 text-white text-center">
            <h1 class="text-3xl font-black mb-2 italic">Magic Postcard 💌</h1>
            <p class="text-teal-100 font-medium">הופכים מילים לציורים קסומים</p>
        </div>

        <div class="p-8">
            <textarea id="promptInput" rows="3" 
                class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-teal-500 outline-none transition-all mb-4 text-lg shadow-inner"
                placeholder="מה נצייר היום?"></textarea>

            <button id="btn" onclick="generate()" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all text-xl">
                צייר לי גלויה!
            </button>
            
            <div id="debug" class="hidden mt-4 p-3 bg-slate-50 text-slate-500 rounded-lg text-[10px] font-mono border border-slate-100">
                <ul id="logs" class="list-disc list-inside"></ul>
            </div>
        </div>

        <div class="bg-slate-50 p-6 flex flex-col items-center justify-center min-h-[380px]">
            <!-- אנימציית טעינה -->
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="w-16 h-16 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status" class="font-bold text-teal-700 text-xl loading-pulse">הקסם מתרחש...</p>
            </div>

            <!-- התוצאה -->
            <div id="result" class="hidden w-full flex flex-col items-center">
                <div class="bg-white postcard-container rounded-sm transform rotate-1 transition-transform hover:rotate-0 duration-500">
                    <img id="img" class="w-full h-auto" src="" alt="Postcard">
                </div>
                <div class="mt-6 w-full border-t border-dashed border-slate-300 pt-4 flex justify-between items-center px-4">
                    <p class="font-serif italic text-slate-400">Greetings from Imagination</p>
                    <div class="w-10 h-12 bg-slate-200 rounded-sm opacity-50 border border-slate-300"></div>
                </div>
            </div>

            <div id="placeholder" class="text-slate-300 font-medium text-center">
                <svg class="w-16 h-16 mx-auto mb-2 opacity-20" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"></path></svg>
                הגלויה שלכם תופיע כאן
            </div>
        </div>
    </div>

    <script>
        function log(m) {
            const list = document.getElementById('logs');
            const li = document.createElement('li');
            li.innerText = m;
            list.appendChild(li);
            document.getElementById('debug').classList.remove('hidden');
        }

        async function generate() {
            const input = document.getElementById('promptInput').value.trim();
            if(!input) return;

            // ניקוי מסך
            document.getElementById('logs').innerHTML = "";
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btn').disabled = true;
            
            const status = document.getElementById('status');
            let finalPrompt = "magical landscape";

            try {
                log("מנתח את התיאור...");
                status.innerText = "מתרגם...";

                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptInput: input })
                });
                
                const data = await res.json();
                
                // ניקוי תווים לא לטיניים מהתוצאה (ליתר ביטחון)
                finalPrompt = (data.refinedPrompt || "magical land").replace(/[^\x00-\x7F]/g, "");
                log("פרומפט סופי: " + finalPrompt);

                status.innerText = "מצייר...";
                log("יוצר את התמונה...");

                const seed = Math.floor(Math.random() * 1000000);
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=flux`;

                const tempImg = new Image();
                tempImg.onload = () => {
                    document.getElementById('img').src = imageUrl;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('btn').disabled = false;
                    log("הצלחה!");
                };
                tempImg.onerror = () => {
                    log("שגיאה בשירות התמונות. מנסה גיבוי...");
                    // גיבוי מהיר
                    document.getElementById('img').src = `https://image.pollinations.ai/prompt/fantasy%20landscape?seed=${seed}`;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('btn').disabled = false;
                };
                tempImg.src = imageUrl;

            } catch (e) {
                log("תקלה: " + e.message);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('placeholder').classList.remove('hidden');
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
