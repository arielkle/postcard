<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות הדמיוניות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0fdfa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .postcard-bg {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-teal-100">
        
        <!-- כותרת האפליקציה -->
        <div class="bg-gradient-to-r from-teal-500 to-emerald-500 text-white text-center py-8 px-4">
            <h1 class="text-4xl font-black mb-2 drop-shadow-md">🎨 יוצר הגלויות 🌍</h1>
            <p class="text-teal-50 text-lg">כתבו תיאור של עולם דמיוני, והבינה המלאכותית תצייר גלויה!</p>
        </div>

        <!-- טופס הקלט -->
        <div class="p-6 md:p-10">
            <div class="mb-6">
                <label for="promptInput" class="block text-gray-700 font-bold mb-3 text-xl">תארו את הארץ הדמיונית שלכם:</label>
                <textarea id="promptInput" rows="4" 
                    class="w-full px-5 py-4 border-2 border-teal-100 rounded-2xl focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-50 transition-all resize-none text-gray-700 text-lg shadow-inner"
                    placeholder="לדוגמה: עולם שבו הבניינים עשויים מגבינה צהובה והעננים הם צמר גפן מתוק..."></textarea>
            </div>

            <button id="generateBtn" onclick="generateImage()" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-lg transform hover:scale-[1.02] active:scale-95 text-xl flex justify-center items-center gap-3">
                <span id="btnText">צייר לי גלויה!</span>
            </button>

            <!-- הודעת שגיאה מפורטת -->
            <div id="errorMessage" class="hidden mt-6 bg-red-50 border-r-8 border-red-500 text-red-800 px-6 py-4 rounded-xl shadow-md" role="alert">
                <p class="font-bold text-lg">אופס! משהו לא עבד:</p>
                <p id="errorText" class="font-mono text-sm mt-1"></p>
                <p class="text-xs mt-2 opacity-70 italic font-sans">טיפ: וודאו שמפתח ה-API הוגדר ב-Vercel ושביצעתם Deploy מחדש.</p>
            </div>
        </div>

        <!-- אזור התוצאה -->
        <div class="bg-gray-100 p-8 border-t border-gray-200 flex flex-col items-center justify-center min-h-[400px] postcard-bg relative">
            
            <!-- אנימציית טעינה -->
            <div id="loadingState" class="hidden flex flex-col items-center justify-center text-teal-700">
                <div class="relative w-20 h-20 mb-6">
                    <div class="absolute inset-0 border-8 border-teal-200 rounded-full"></div>
                    <div class="absolute inset-0 border-8 border-teal-600 rounded-full border-t-transparent animate-spin"></div>
                </div>
                <p class="font-bold text-2xl animate-pulse">הקסם מתרחש...</p>
                <p class="text-gray-500 mt-2 text-center max-w-xs">הבינה המלאכותית מעבדת את התיאור שלכם ומציירת את הגלויה. זה לוקח כמה שניות.</p>
            </div>

            <!-- התמונה שנוצרה -->
            <div id="imageResultContainer" class="hidden w-full max-w-md bg-white p-4 shadow-2xl transform rotate-2 hover:rotate-0 transition-all duration-700 rounded-sm">
                <div class="border-4 border-double border-gray-200 p-1">
                    <img id="generatedImage" src="" alt="גלויה מהעולם הדמיוני" class="w-full h-auto">
                </div>
                <div class="mt-6 flex justify-between items-center border-t-2 border-dashed border-gray-300 pt-4">
                    <div class="font-serif text-gray-400 italic text-sm">Postcard from Imagination</div>
                    <div class="bg-gray-200 w-12 h-16 rounded-sm border border-gray-300"></div>
                </div>
            </div>

            <!-- הודעת פתיחה -->
            <div id="initialText" class="text-gray-400 text-center flex flex-col items-center">
                <div class="w-24 h-24 mb-4 opacity-10">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"></path></svg>
                </div>
                <p class="text-xl font-medium">הגלויה שלכם תופיע כאן</p>
            </div>
        </div>

    </div>

    <script>
        async function generateImage() {
            const promptInput = document.getElementById('promptInput').value.trim();
            const errorContainer = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            const btn = document.getElementById('generateBtn');
            const loadingState = document.getElementById('loadingState');
            const initialText = document.getElementById('initialText');
            const imageResultContainer = document.getElementById('imageResultContainer');
            const generatedImage = document.getElementById('generatedImage');

            // ניקוי מצב קודם
            errorContainer.classList.add('hidden');
            
            if (!promptInput) {
                showError("נא לכתוב תיאור קצר לפני שמתחילים.");
                return;
            }

            // עדכון הממשק למצב עבודה
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            initialText.classList.add('hidden');
            imageResultContainer.classList.add('hidden');
            loadingState.classList.remove('hidden');

            try {
                // פנייה לשרת המתווך שלך ב-Vercel
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptInput: promptInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    // אם השרת החזיר שגיאה (למשל מפתח לא תקין)
                    throw new Error(data.error || `Server Error ${response.status}`);
                }

                // בדיקה אם התמונה קיימת בתשובה של גוגל
                if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
                    const base64 = data.predictions[0].bytesBase64Encoded;
                    generatedImage.src = `data:image/png;base64,${base64}`;
                    
                    loadingState.classList.add('hidden');
                    imageResultContainer.classList.remove('hidden');
                } else if (data.error) {
                    throw new Error(data.error.message || "Google API Error");
                } else {
                    throw new Error("לא התקבלה תמונה מהשרת. נסה תיאור אחר.");
                }

            } catch (err) {
                console.error("Technical Issue:", err);
                showError(err.message);
                loadingState.classList.add('hidden');
                initialText.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function showError(msg) {
            const errorContainer = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.innerText = msg;
            errorContainer.classList.remove('hidden');
        }
    </script>
</body>
</html>
