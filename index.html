<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות הדמיוניות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, sans-serif; }
        .hidden { display: none; }
        .postcard-container { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-teal-600 p-8 text-white text-center">
            <h1 class="text-3xl font-black mb-2 italic">Magic Postcard 💌</h1>
            <p class="text-teal-100 font-medium">הופכים מילים לציורים קסומים</p>
        </div>

        <div class="p-8">
            <textarea id="promptInput" rows="3" 
                class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-teal-500 outline-none transition-all mb-4 text-lg shadow-inner"
                placeholder="מה נצייר היום?"></textarea>

            <button id="btn" onclick="generate()" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all text-xl">
                צייר לי גלויה!
            </button>
            
            <div id="debug" class="hidden mt-4 p-3 bg-slate-100 text-slate-600 rounded-lg text-[10px] font-mono border border-slate-200">
                <ul id="logs" class="list-disc list-inside"></ul>
            </div>
        </div>

        <div class="bg-slate-50 p-6 flex flex-col items-center justify-center min-h-[350px]">
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status" class="font-bold text-teal-700 text-xl animate-pulse">הקסם מתחיל...</p>
            </div>

            <div id="result" class="hidden w-full flex flex-col items-center">
                <div class="bg-white p-3 postcard-container border-8 border-white rounded-sm transform rotate-1">
                    <img id="img" class="w-full h-auto shadow-inner" src="" alt="Postcard">
                </div>
                <p class="mt-6 font-serif italic text-slate-400 border-t border-dashed border-slate-300 pt-2 w-full text-center">Greetings from Imagination</p>
            </div>

            <p id="placeholder" class="text-slate-300 font-medium">הגלויה המוכנה תופיע כאן</p>
        </div>
    </div>

    <script>
        function log(m) {
            const list = document.getElementById('logs');
            const li = document.createElement('li');
            li.innerText = m;
            list.appendChild(li);
            document.getElementById('debug').classList.remove('hidden');
        }

        async function generate() {
            const input = document.getElementById('promptInput').value.trim();
            if(!input) return;

            // איפוס ממשק
            document.getElementById('logs').innerHTML = "";
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btn').disabled = true;
            
            const status = document.getElementById('status');
            let finalPrompt = "magical landscape";

            try {
                log("פונה לשרת לתרגום...");
                status.innerText = "מעבד...";

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ promptInput: input })
                    });
                    const data = await res.json();
                    finalPrompt = data.refinedPrompt || finalPrompt;
                    log("תרגום מוכן: " + finalPrompt);
                } catch(e) {
                    log("דילוג על תרגום בשל איטיות.");
                }

                status.innerText = "מצייר...";
                log("פונה לשירות הציור...");

                const seed = Math.floor(Math.random() * 1000000);
                // שימוש בכתובת המודרנית של Pollinations
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;

                const tempImg = new Image();
                tempImg.onload = () => {
                    document.getElementById('img').src = imageUrl;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('btn').disabled = false;
                    log("הצלחה!");
                };
                tempImg.onerror = () => {
                    log("שגיאה בטעינת התמונה. מנסה שוב...");
                    // ניסיון אחרון עם מודל בסיסי
                    document.getElementById('img').src = `https://image.pollinations.ai/prompt/colorful%20dream%20landscape?seed=${seed}`;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('btn').disabled = false;
                };
                tempImg.src = imageUrl;

            } catch (e) {
                log("תקלה: " + e.message);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('placeholder').classList.remove('hidden');
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
