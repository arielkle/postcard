<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל תמונות AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .hidden { display: none; }
        .image-card { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 1rem;
            overflow: hidden;
            background: white;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <!-- כותרת -->
        <div class="bg-slate-800 p-8 text-white text-center">
            <h1 class="text-3xl font-bold mb-2">מחולל תמונות AI 🖼️</h1>
            <p class="text-slate-400 font-medium">מה שאתם כותבים - זה מה שמצוין</p>
        </div>

        <!-- קלט -->
        <div class="p-8">
            <label class="block text-slate-700 font-bold mb-3 text-lg">מה תרצו ליצור?</label>
            <textarea id="promptInput" rows="3" 
                class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-slate-800 outline-none transition-all mb-4 text-lg shadow-inner bg-slate-50"
                placeholder="למשל: מכונית ספורט אדומה נוסעת על כביש מהיר בלילה..."></textarea>

            <button id="btn" onclick="generate()" 
                class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all text-xl flex justify-center items-center gap-3">
                <span id="btnText">צור תמונה</span>
            </button>
            
            <div id="debug" class="hidden mt-4 p-3 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-mono border border-slate-100 overflow-hidden">
                <ul id="logs" class="list-disc list-inside"></ul>
            </div>
        </div>

        <!-- תצוגה -->
        <div class="bg-slate-50 p-6 flex flex-col items-center justify-center min-h-[400px] border-t border-slate-100">
            <!-- טעינה -->
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-slate-800 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status" class="font-bold text-slate-800 text-lg">יוצר את התמונה...</p>
            </div>

            <!-- תמונה סופית -->
            <div id="result" class="hidden w-full flex flex-col items-center">
                <div class="image-card">
                    <img id="img" class="w-full h-auto" src="" alt="התמונה שנוצרה">
                </div>
                <button onclick="downloadImage()" class="mt-4 text-slate-500 text-sm hover:underline">שמור תמונה</button>
            </div>

            <!-- הודעה התחלתית -->
            <div id="placeholder" class="text-slate-300 font-medium text-center opacity-50">
                <p>התמונה תופיע כאן</p>
            </div>
        </div>
    </div>

    <script>
        function addLog(m) {
            const list = document.getElementById('logs');
            const li = document.createElement('li');
            li.innerText = m;
            list.appendChild(li);
            document.getElementById('debug').classList.remove('hidden');
        }

        async function generate() {
            const input = document.getElementById('promptInput').value.trim();
            if(!input) return;

            document.getElementById('logs').innerHTML = "";
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            
            const status = document.getElementById('status');

            try {
                addLog("1. מנתח את הבקשה שלך...");
                
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptInput: input })
                });
                
                const data = await res.json();
                const finalPrompt = (data.refinedPrompt || input).replace(/[^\x00-\x7F]/g, "");
                addLog("2. פרומפט באנגלית: " + finalPrompt);

                status.innerText = "מצייר...";
                
                const seed = Math.floor(Math.random() * 1000000);
                // שימוש במודל turbo למהירות מקסימלית
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=turbo`;

                const tempImg = new Image();
                tempImg.onload = () => {
                    document.getElementById('img').src = imageUrl;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    btn.disabled = false;
                    addLog("3. הצלחה!");
                };
                tempImg.onerror = () => { throw new Error("בעיה בייצור התמונה"); };
                tempImg.src = imageUrl;

            } catch (e) {
                addLog("שגיאה: " + e.message);
                btn.disabled = false;
            }
        }

        function downloadImage() {
            const url = document.getElementById('img').src;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
