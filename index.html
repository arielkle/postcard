<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .postcard-shadow { shadow-lg; border: 8px solid white; outline: 1px solid #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 text-white p-8 text-center">
            <h1 class="text-3xl font-black mb-1">גלויה מהדמיון 🎨</h1>
            <p class="opacity-80">כתבו תיאור וצפו בקסם</p>
        </div>

        <div class="p-6">
            <textarea id="promptInput" rows="3" 
                class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none transition-all mb-4 text-lg"
                placeholder="לדוגמה: אי של שוקולד בלב ים של חלב..."></textarea>

            <button id="btn" onclick="go()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-xl">
                צייר לי גלויה!
            </button>
            
            <div id="err" class="hidden mt-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm border-r-4 border-red-500"></div>
        </div>

        <div class="bg-slate-50 p-6 flex flex-col items-center justify-center min-h-[350px] relative">
            <!-- מצב טעינה -->
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status" class="font-bold text-indigo-600">מתחיל...</p>
            </div>

            <!-- התוצאה -->
            <div id="result" class="hidden w-full flex flex-col items-center">
                <img id="img" class="w-full h-auto postcard-shadow rounded-sm" src="" alt="גלויה">
                <p class="mt-4 font-serif italic text-slate-400">Greetings from far away</p>
            </div>

            <p id="empty" class="text-slate-300">הגלויה תופיע כאן</p>
        </div>
    </div>

    <script>
        async function go() {
            const input = document.getElementById('promptInput').value.trim();
            if(!input) return;

            // איפוס מסך
            document.getElementById('err').classList.add('hidden');
            document.getElementById('empty').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btn').disabled = true;
            
            const status = document.getElementById('status');
            status.innerText = "מעבד את הבקשה...";

            let finalPrompt = input;

            try {
                // שלב 1: ניסיון תרגום (עם Timeout)
                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ promptInput: input })
                    });
                    const data = await res.json();
                    if(data.refinedPrompt) finalPrompt = data.refinedPrompt;
                } catch(e) {
                    console.log("Using original prompt due to server delay");
                }

                status.innerText = "מצייר את הגלויה...";

                // שלב 2: יצירת תמונה
                const seed = Math.floor(Math.random() * 1000000);
                const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(finalPrompt)}?width=800&height=800&seed=${seed}&model=turbo`;

                const imageObj = new Image();
                imageObj.onload = () => {
                    document.getElementById('img').src = imageUrl;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('btn').disabled = false;
                };
                imageObj.onerror = () => { throw new Error("בעיה בטעינת התמונה"); };
                imageObj.src = imageUrl;

            } catch (e) {
                document.getElementById('err').innerText = "שגיאה: " + e.message;
                document.getElementById('err').classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('empty').classList.remove('hidden');
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
