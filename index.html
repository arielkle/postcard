<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות הדמיוניות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .postcard-frame { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-teal-100">
        <div class="bg-gradient-to-r from-teal-500 to-emerald-500 text-white text-center py-8 px-4">
            <h1 class="text-4xl font-black mb-2">🎨 יוצר הגלויות 🌍</h1>
            <p class="text-teal-50 text-lg">תארו עולם דמיוני והבינה המלאכותית תצייר אותו!</p>
        </div>

        <div class="p-6 md:p-10">
            <textarea id="promptInput" rows="4" 
                class="w-full px-5 py-4 border-2 border-teal-100 rounded-2xl focus:outline-none focus:border-teal-500 text-lg mb-6 shadow-inner"
                placeholder="לדוגמה: עיר שכולה עשויה מבלונים ומרחפת בשמיים..."></textarea>

            <button id="generateBtn" onclick="generateImage()" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg text-xl flex justify-center items-center gap-3">
                צייר לי גלויה!
            </button>

            <div id="errorMessage" class="hidden mt-6 bg-red-50 border-r-8 border-red-500 text-red-800 px-6 py-4 rounded-xl shadow-md">
                <p id="errorText" class="font-mono text-sm"></p>
            </div>
        </div>

        <div class="bg-gray-100 p-8 border-t border-gray-200 flex flex-col items-center justify-center min-h-[400px] postcard-frame relative">
            <div id="loadingState" class="hidden flex flex-col items-center text-teal-700">
                <div class="animate-spin h-16 w-16 border-4 border-teal-500 border-t-transparent rounded-full mb-4"></div>
                <p class="font-bold text-2xl animate-pulse">הבינה המלאכותית חולמת...</p>
            </div>

            <div id="imageResultContainer" class="hidden w-full max-w-md bg-white p-4 shadow-2xl transform rotate-2 rounded-sm border-4 border-double border-gray-200">
                <img id="generatedImage" src="" alt="גלויה מהדמיון" class="w-full h-auto">
                <div class="mt-4 text-center font-serif text-gray-400 italic">Postcard from Imagination</div>
            </div>

            <div id="initialText" class="text-gray-400 text-center">
                <p class="text-xl">הגלויה שלכם תופיע כאן</p>
            </div>
        </div>
    </div>

    <script>
        async function generateImage() {
            const promptInput = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const loadingState = document.getElementById('loadingState');
            const initialText = document.getElementById('initialText');
            const imageResultContainer = document.getElementById('imageResultContainer');
            const generatedImage = document.getElementById('generatedImage');
            const errorContainer = document.getElementById('errorMessage');

            if (!promptInput) return;

            errorContainer.classList.add('hidden');
            btn.disabled = true;
            loadingState.classList.remove('hidden');
            initialText.classList.add('hidden');
            imageResultContainer.classList.add('hidden');

            try {
                // 1. קריאה לשרת שלנו כדי לקבל פרומפט באנגלית
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptInput })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "שגיאה בשרת");

                const refinedPrompt = encodeURIComponent(data.refinedPrompt);
                
                // 2. יצירת כתובת תמונה דרך שירות Pollinations (חופשי וחינמי)
                const imageUrl = `https://pollinations.ai/p/${refinedPrompt}?width=800&height=800&seed=${Math.floor(Math.random()*10000)}&model=flux`;

                // טעינה והצגה
                const img = new Image();
                img.onload = () => {
                    generatedImage.src = imageUrl;
                    loadingState.classList.add('hidden');
                    imageResultContainer.classList.remove('hidden');
                    btn.disabled = false;
                };
                img.onerror = () => { throw new Error("בעיה בטעינת התמונה מהשרת"); };
                img.src = imageUrl;

            } catch (err) {
                document.getElementById('errorText').innerText = err.message;
                errorContainer.classList.remove('hidden');
                loadingState.classList.add('hidden');
                initialText.classList.remove('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
