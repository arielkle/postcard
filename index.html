<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יוצר הגלויות הדמיוניות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdfa; font-family: 'Segoe UI', sans-serif; }
        .postcard-frame { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .hidden { display: none; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .progress-bar { animation: progress 10s linear forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-teal-100">
        <div class="bg-gradient-to-r from-teal-500 to-emerald-500 text-white text-center py-8 px-4">
            <h1 class="text-3xl font-bold mb-2 text-shadow">🎨 יוצר הגלויות המהיר 🌍</h1>
            <p class="text-teal-50">גרסת ביצועים משופרת</p>
        </div>

        <div class="p-6 md:p-8">
            <textarea id="promptInput" rows="3" 
                class="w-full px-4 py-3 border-2 border-teal-100 rounded-xl focus:outline-none focus:border-teal-500 text-lg mb-4 shadow-inner"
                placeholder="מה יש בארץ שלכם?"></textarea>

            <button id="generateBtn" onclick="generateImage()" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-xl">
                צייר לי גלויה!
            </button>

            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 text-red-800 rounded-xl border-r-4 border-red-500">
                <p id="errorText" class="text-sm font-mono"></p>
            </div>
        </div>

        <div class="bg-gray-50 p-6 border-t flex flex-col items-center justify-center min-h-[350px] postcard-frame relative">
            
            <!-- חיווי טעינה -->
            <div id="loadingState" class="hidden w-full flex flex-col items-center">
                <div class="w-full max-w-xs bg-gray-200 rounded-full h-2 mb-4 overflow-hidden">
                    <div id="progressBar" class="bg-teal-500 h-full progress-bar"></div>
                </div>
                <p id="loadingStatus" class="font-bold text-teal-700 animate-pulse text-xl">מפעיל את הדמיון...</p>
                <p class="text-xs text-gray-500 mt-2">אם זה לוקח יותר מ-15 שניות, נסו לרענן.</p>
            </div>

            <div id="imageResultContainer" class="hidden w-full max-w-sm bg-white p-3 shadow-2xl border-4 border-double border-gray-200 transform rotate-1">
                <img id="generatedImage" src="" alt="גלויה" class="w-full h-auto">
                <p class="mt-4 text-center font-serif text-gray-400 italic">דרישת שלום מהדמיון</p>
            </div>

            <div id="initialText" class="text-gray-400 text-center">
                הגלויה תופיע כאן
            </div>
        </div>
    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('loadingStatus');
            const errorContainer = document.getElementById('errorMessage');

            if (!prompt) return;

            errorContainer.classList.add('hidden');
            btn.disabled = true;
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('initialText').classList.add('hidden');
            document.getElementById('imageResultContainer').classList.add('hidden');
            
            status.innerText = "מתרגם את התיאור...";

            try {
                // שלב 1: תרגום
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptInput: prompt })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "שגיאת שרת");

                status.innerText = "מצייר את הגלויה...";
                
                // שלב 2: יצירת תמונה
                const refined = encodeURIComponent(data.refinedPrompt);
                const imageUrl = `https://pollinations.ai/p/${refined}?width=800&height=800&seed=${Date.now()}&nologo=true`;

                const img = new Image();
                img.onload = () => {
                    document.getElementById('generatedImage').src = imageUrl;
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('imageResultContainer').classList.remove('hidden');
                    btn.disabled = false;
                };
                img.onerror = () => { throw new Error("טעינת התמונה נכשלה"); };
                img.src = imageUrl;

            } catch (err) {
                document.getElementById('errorText').innerText = err.message;
                errorContainer.classList.remove('hidden');
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('initialText').classList.remove('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
